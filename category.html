<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse all stories by category on The Daily Pulse.">
  <title>Category — The Daily Pulse</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header injected by utils.js -->
  <div id="header-placeholder"></div>

  <main id="category-main">

    <!-- Category Header -->
    <div id="category-header">
      <div class="cat-page-header">
        <div class="container">
          <div class="skeleton" style="height:16px;width:60px;margin-bottom:16px;border-radius:3px;"></div>
          <div class="skeleton" style="height:44px;width:220px;margin-bottom:10px;border-radius:3px;"></div>
        </div>
      </div>
    </div>

    <!-- Category Articles -->
    <div id="category-articles">
      <div class="container">
        <div class="cat-articles-grid">
          <div class="skeleton" style="height:280px;border-radius:2px;"></div>
          <div class="skeleton" style="height:280px;border-radius:2px;"></div>
          <div class="skeleton" style="height:280px;border-radius:2px;"></div>
        </div>
      </div>
    </div>

  </main>

  <!-- Footer injected by utils.js -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/category.js"></script>

</body>
</html>
